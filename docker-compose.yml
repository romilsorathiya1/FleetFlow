version: "3.9"

services:
  app:
    build: .
    container_name: nextjs_app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/fleetflow
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules
    restart: always

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    restart: always
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
